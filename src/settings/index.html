<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoType 設定</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🎙️ NoType 設定</h1>
      <p class="subtitle">AI 語音輸入工具</p>
    </header>

    <!-- STT 引擎選擇 -->
    <section class="card">
      <h2>語音辨識引擎</h2>
      <div class="form-group">
        <label for="sttProvider">STT 服務</label>
        <select id="sttProvider">
          <option value="openai">OpenAI Whisper</option>
          <option value="groq">Groq</option>
        </select>
      </div>
    </section>

    <!-- API Key -->
    <section class="card">
      <h2>API Key</h2>
      <div class="form-group">
        <label for="openaiApiKey">OpenAI API Key</label>
        <div class="input-row">
          <input type="password" id="openaiApiKey" placeholder="sk-...">
          <button class="btn-test" data-provider="openai">測試</button>
        </div>
      </div>
      <div class="form-group">
        <label for="groqApiKey">Groq API Key</label>
        <div class="input-row">
          <input type="password" id="groqApiKey" placeholder="gsk_...">
          <button class="btn-test" data-provider="groq">測試</button>
        </div>
      </div>
    </section>

    <!-- 語言與快捷鍵 -->
    <section class="card">
      <h2>一般設定</h2>
      <div class="form-group">
        <label for="language">辨識語言</label>
        <select id="language">
          <option value="zh-TW">繁體中文</option>
          <option value="zh-CN">簡體中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
        </select>
      </div>
      <div class="form-group">
        <label for="shortcut">主錄音快捷鍵</label>
        <input type="text" id="shortcut" readonly placeholder="點擊後按下右 Ctrl...">
        <span class="hint">點擊輸入框後，按下右側 Ctrl，按住錄音、放開停止</span>
      </div>
      <div class="form-group">
        <label for="secondaryShortcut">翻譯錄音快捷鍵</label>
        <input type="text" id="secondaryShortcut" readonly placeholder="點擊後按下右 Ctrl + Shift...">
        <span class="hint">使用這組快捷鍵錄音後，會輸出成下方指定語言</span>
      </div>
      <div class="form-group">
        <label for="outputLanguage">翻譯輸出語言</label>
        <select id="outputLanguage">
          <option value="zh-TW">繁體中文</option>
          <option value="zh-CN">簡體中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
        </select>
      </div>
    </section>

    <!-- LLM 潤飾 -->
    <section class="card">
      <h2>文字潤飾</h2>
      <div class="form-group checkbox-group">
        <input type="checkbox" id="enablePolish">
        <label for="enablePolish">啟用 AI 文字潤飾（移除贅詞、修正文法）</label>
      </div>
      <div class="form-group">
        <label for="polishProvider">潤飾引擎</label>
        <select id="polishProvider">
          <option value="openai">OpenAI GPT</option>
          <option value="groq">Groq</option>
        </select>
      </div>
    </section>

    <!-- 字詞列表 -->
    <section class="card">
      <h2>字詞列表</h2>
      <p class="card-description">加入專有名詞、品牌名、人名或常見誤辨識字詞，幫助 STT 提示與後續自動修正。</p>
      <div id="vocabularyList" class="vocabulary-list"></div>
      <button id="addVocabularyBtn" type="button" class="btn-secondary">新增一筆字詞</button>
      <span class="hint">正確字詞會作為優先辨識目標；常見錯詞/別名請用逗號分隔，例如：Claude Code, claude code, 克勞德 code</span>
    </section>

    <!-- 其他 -->
    <section class="card">
      <h2>其他</h2>
      <div class="form-group checkbox-group">
        <input type="checkbox" id="copyToClipboard">
        <label for="copyToClipboard">同時複製到剪貼簿</label>
      </div>
      <div class="form-group checkbox-group">
        <input type="checkbox" id="launchAtStartup">
        <label for="launchAtStartup">開機自動啟動</label>
      </div>
    </section>

    <div class="actions">
      <button id="saveBtn" class="btn-primary">儲存設定</button>
      <span id="saveStatus" class="save-status"></span>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
